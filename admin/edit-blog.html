<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Blog Posts - Apex Hub Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .blog-posts-table { width: 100%; }
        .blog-title-cell { max-width: 300px; }
        .blog-title-cell strong { display: block; margin-bottom: 3px; }
        .blog-title-cell small { color: var(--text-light); font-size: 0.75rem; }
        .rich-editor {
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            min-height: 300px;
            padding: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            overflow-y: auto;
            background: white;
        }
        .rich-editor:focus { outline: none; border-color: var(--primary); }
        .editor-toolbar {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            flex-wrap: wrap;
        }
        .editor-toolbar button {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            transition: var(--transition);
        }
        .editor-toolbar button:hover { background: #e8eaf6; border-color: var(--primary); }
        .editor-toolbar button.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tags-input { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; border: 2px solid var(--border); border-radius: var(--radius-sm); min-height: 45px; align-items: center; cursor: text; }
        .tag-item { display: flex; align-items: center; gap: 5px; background: #e8eaf6; padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; }
        .tag-item .remove-tag { cursor: pointer; color: #999; font-weight: bold; }
        .tag-item .remove-tag:hover { color: var(--danger); }
        .tags-input input { border: none; outline: none; flex: 1; min-width: 100px; font-family: 'Poppins', sans-serif; font-size: 0.85rem; }
    </style>
</head>
<body>
    <aside class="admin-sidebar">
        <div class="sidebar-logo"><h2>APEX<span>HUB</span></h2><p class="logo-subtitle">Admin Panel</p></div>
        <div class="sidebar-user"><div class="sidebar-avatar">AD</div><div class="sidebar-user-info"><h4>Admin</h4><p>Super Admin</p></div></div>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> <span>Dashboard</span></a></li>
            <p class="sidebar-section-title">Content</p>
            <li><a href="edit-hero.html"><i class="fas fa-image"></i> <span>Hero</span></a></li>
            <li><a href="manage-courses.html"><i class="fas fa-book"></i> <span>Courses</span></a></li>
            <li><a href="edit-batches.html"><i class="fas fa-calendar-alt"></i> <span>Batches</span></a></li>
            <li><a href="edit-testimonials.html"><i class="fas fa-star"></i> <span>Testimonials</span></a></li>
            <li><a href="edit-faculty.html"><i class="fas fa-chalkboard-teacher"></i> <span>Faculty</span></a></li>
            <li><a href="edit-blog.html" class="active"><i class="fas fa-newspaper"></i> <span>Blog</span></a></li>
            <li><a href="edit-pages.html"><i class="fas fa-file-alt"></i> <span>Pages</span></a></li>
            <li><a href="site-settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            <li><a href="#" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li>
        </ul>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <div class="admin-header-left">
                <h1>📝 Manage Blog Posts</h1>
                <p class="breadcrumb">Content / <strong>Blog</strong></p>
            </div>
            <button class="btn btn-primary" onclick="openBlogEditor()"><i class="fas fa-plus"></i> New Post</button>
        </div>

        <div class="dashboard-card" style="margin-bottom:25px;">
            <div style="overflow-x:auto;">
                <table class="data-table blog-posts-table">
                    <thead>
                        <tr>
                            <th>Post</th><th>Category</th><th>Author</th><th>Date</th>
                            <th>Views</th><th>Status</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="blogTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Blog Editor Modal -->
    <div class="modal-overlay" id="blogModal">
        <div class="modal" style="max-width:900px;width:95%;">
            <button class="modal-close" onclick="closeBlogEditor()">✕</button>
            <h3 id="blogModalTitle">📝 New Blog Post</h3>
            
            <form onsubmit="saveBlogPost(event)">
                <input type="hidden" id="blogId">
                
                <div class="form-row">
                    <div class="form-group"><label>Title *</label><input type="text" id="blogTitle" required></div>
                    <div class="form-group"><label>Slug (URL)</label><input type="text" id="blogSlug" placeholder="auto-generated"></div>
                </div>
                
                <div class="form-row">
                    <div class="form-group"><label>Category *</label>
                        <select id="blogCategory" required>
                            <option value="">Select</option>
                            <option>CG PSC</option><option>CG Vyapam</option>
                            <option>NEET</option><option>JEE</option>
                            <option>Study Tips</option><option>Notifications</option>
                            <option>Topper Interview</option><option>Current Affairs</option>
                            <option>Wellness</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Author</label><input type="text" id="blogAuthor" value="Apex Hub Team"></div>
                </div>
                
                <div class="form-row">
                    <div class="form-group"><label>Read Time</label><input type="text" id="blogReadTime" placeholder="e.g., 8 min read"></div>
                    <div class="form-group"><label>Publish Date</label><input type="date" id="blogDate"></div>
                </div>
                
                <div class="form-group"><label>Excerpt / Summary</label><textarea id="blogExcerpt" rows="2" placeholder="Brief summary shown in blog cards..."></textarea></div>
                
                <div class="form-group">
                    <label>Content</label>
                    <div class="editor-toolbar">
                        <button type="button" onclick="execCmd('bold')" title="Bold"><strong>B</strong></button>
                        <button type="button" onclick="execCmd('italic')" title="Italic"><em>I</em></button>
                        <button type="button" onclick="execCmd('underline')" title="Underline"><u>U</u></button>
                        <button type="button" onclick="execCmd('insertUnorderedList')" title="Bullet List">• List</button>
                        <button type="button" onclick="execCmd('insertOrderedList')" title="Numbered List">1. List</button>
                        <button type="button" onclick="execCmd('formatBlock', '<h2>')" title="Heading">H2</button>
                        <button type="button" onclick="execCmd('formatBlock', '<h3>')" title="Subheading">H3</button>
                        <button type="button" onclick="execCmd('createLink', prompt('Enter URL:'))" title="Insert Link">🔗 Link</button>
                        <button type="button" onclick="execCmd('insertImage', prompt('Enter image URL:'))" title="Insert Image">🖼️ Image</button>
                    </div>
                    <div class="rich-editor" id="blogContentEditor" contenteditable="true"></div>
                </div>
                
                <div class="form-group">
                    <label>Tags</label>
                    <div class="tags-input" id="tagsContainer" onclick="document.getElementById('tagInput').focus()">
                        <input type="text" id="tagInput" placeholder="Type tag and press Enter..." onkeydown="handleTagInput(event)">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group"><label>Featured Post</label>
                        <select id="blogFeatured"><option value="true">Yes - Show on top</option><option value="false">No</option></select>
                    </div>
                    <div class="form-group"><label>Status</label>
                        <select id="blogStatus"><option value="published">Published</option><option value="draft">Draft</option></select>
                    </div>
                </div>
                
                <div class="btn-row">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Post</button>
                    <button type="button" class="btn btn-outline" onclick="closeBlogEditor()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/admin-editor.js"></script>
    <script>
        checkAdminAuth();
        let blogPosts = getSection('blog');
        let editingId = null;
        let currentTags = [];

        function renderBlogTable() {
            const tbody = document.getElementById('blogTableBody');
            tbody.innerHTML = blogPosts.map(p => `
                <tr>
                    <td class="blog-title-cell">
                        <strong>${p.title}</strong>
                        <small>${p.excerpt?.substring(0, 80)}...</small>
                    </td>
                    <td><span class="status-badge status-scheduled">${p.category}</span></td>
                    <td>${p.author}</td>
                    <td>${formatDate(p.date)}</td>
                    <td>${(p.views || 0).toLocaleString()}</td>
                    <td><span class="status-badge ${p.status === 'published' ? 'status-published' : 'status-draft'}">${p.status}</span></td>
                    <td>
                        <button class="action-btn btn-edit" onclick="editPost('${p.id}')">Edit</button>
                        <button class="action-btn btn-view" onclick="previewPost('${p.slug}')">View</button>
                        <button class="action-btn btn-delete" onclick="deletePost('${p.id}')">Del</button>
                    </td>
                </tr>
            `).join('');
        }

        function openBlogEditor(id = null) {
            editingId = id;
            document.getElementById('blogModalTitle').textContent = id ? '✏️ Edit Post' : '📝 New Blog Post';
            currentTags = [];
            document.getElementById('tagsContainer').querySelectorAll('.tag-item').forEach(el => el.remove());
            
            if (id) {
                const p = blogPosts.find(x => x.id === id);
                if (p) {
                    document.getElementById('blogId').value = p.id;
                    document.getElementById('blogTitle').value = p.title;
                    document.getElementById('blogSlug').value = p.slug || '';
                    document.getElementById('blogCategory').value = p.category;
                    document.getElementById('blogAuthor').value = p.author;
                    document.getElementById('blogReadTime').value = p.readTime;
                    document.getElementById('blogDate').value = p.date;
                    document.getElementById('blogExcerpt').value = p.excerpt || '';
                    document.getElementById('blogContentEditor').innerHTML = p.content || '';
                    document.getElementById('blogFeatured').value = p.featured?.toString() || 'false';
                    document.getElementById('blogStatus').value = p.status;
                    if (p.tags) p.tags.forEach(t => addTag(t));
                }
            } else {
                document.getElementById('blogId').value = '';
                ['blogTitle','blogSlug','blogAuthor','blogReadTime','blogExcerpt'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('blogCategory').value = '';
                document.getElementById('blogDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('blogContentEditor').innerHTML = '';
                document.getElementById('blogFeatured').value = 'false';
                document.getElementById('blogStatus').value = 'draft';
            }
            document.getElementById('blogModal').classList.add('active');
        }

        function closeBlogEditor() {
            document.getElementById('blogModal').classList.remove('active');
            editingId = null;
        }

        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('blogContentEditor').focus();
        }

        function addTag(text) {
            if (!text || currentTags.includes(text)) return;
            currentTags.push(text);
            const container = document.getElementById('tagsContainer');
            const tagEl = document.createElement('span');
            tagEl.className = 'tag-item';
            tagEl.innerHTML = `${text} <span class="remove-tag" onclick="removeTag('${text}', this.parentElement)">×</span>`;
            container.insertBefore(tagEl, document.getElementById('tagInput'));
        }

        function removeTag(text, element) {
            currentTags = currentTags.filter(t => t !== text);
            element.remove();
        }

        function handleTagInput(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const value = document.getElementById('tagInput').value.trim();
                if (value) { addTag(value); document.getElementById('tagInput').value = ''; }
            }
        }

        // Auto-generate slug from title
        document.getElementById('blogTitle').addEventListener('input', function() {
            if (!editingId) {
                document.getElementById('blogSlug').value = this.value.toLowerCase()
                    .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            }
        });

        function saveBlogPost(e) {
            e.preventDefault();
            const data = {
                id: document.getElementById('blogId').value || generateId('blog'),
                title: document.getElementById('blogTitle').value,
                slug: document.getElementById('blogSlug').value || document.getElementById('blogTitle').value.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
                category: document.getElementById('blogCategory').value,
                author: document.getElementById('blogAuthor').value,
                readTime: document.getElementById('blogReadTime').value,
                date: document.getElementById('blogDate').value,
                excerpt: document.getElementById('blogExcerpt').value,
                content: document.getElementById('blogContentEditor').innerHTML,
                tags: currentTags,
                featured: document.getElementById('blogFeatured').value === 'true',
                status: document.getElementById('blogStatus').value,
                views: editingId ? (blogPosts.find(p => p.id === editingId)?.views || 0) : 0,
                comments: editingId ? (blogPosts.find(p => p.id === editingId)?.comments || 0) : 0,
                icon: 'fa-newspaper',
                imageColor: 'linear-gradient(135deg, #667eea, #764ba2)'
            };
            
            if (editingId) { updateItem('blog', editingId, data); }
            else { addItem('blog', data); }
            
            blogPosts = getSection('blog');
            renderBlogTable();
            closeBlogEditor();
            showToast('✅ Blog post saved!');
        }

        function editPost(id) { openBlogEditor(id); }

        function deletePost(id) {
            if (confirm('Delete this blog post?')) {
                deleteItem('blog', id);
                blogPosts = getSection('blog');
                renderBlogTable();
                showToast('🗑️ Post deleted.');
            }
        }

        function previewPost(slug) {
            window.open(`../pages/blog.html#${slug}`, '_blank');
        }

        document.getElementById('blogModal').addEventListener('click', function(e) {
            if (e.target === this) closeBlogEditor();
        });

        renderBlogTable();
    </script>
</body>
</html>
