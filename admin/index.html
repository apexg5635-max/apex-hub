<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Apex Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a237e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-logo { margin-bottom: 25px; }
        .login-logo h2 { font-size: 2rem; color: #1a237e; letter-spacing: 2px; font-weight: 800; }
        .login-logo span { color: #f5a623; }
        .login-logo small { color: #888; display: block; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 3px; }
        .login-card h3 { margin-bottom: 8px; font-size: 1.2rem; color: #333; }
        .login-card > p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; color: #333; }
        .form-group input {
            width: 100%; padding: 12px 15px; border: 2px solid #e5e7eb;
            border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 0.95rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #1a237e; }
        .password-field { position: relative; }
        .password-field input { padding-right: 45px; }
        .toggle-password {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #999; background: none; border: none; font-size: 1rem;
        }
        .login-error {
            display: none; background: #fee2e2; color: #991b1b;
            padding: 12px 15px; border-radius: 8px; margin-bottom: 15px;
            font-size: 0.85rem; text-align: left;
        }
        .btn-login {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #1a237e, #283593);
            color: white; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            font-family: 'Poppins', sans-serif; transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(26,35,126,0.3); }
        .btn-login:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .login-footer { margin-top: 20px; font-size: 0.8rem; color: #888; }
        .login-footer a { color: #1a237e; text-decoration: none; font-weight: 500; }
        .login-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <h2>APEX<span>HUB</span></h2>
            <small>Admin Panel</small>
        </div>
        <h3><i class="fas fa-lock"></i> Admin Login</h3>
        <p>Enter your credentials to access the dashboard</p>
        
        <div class="login-error" id="loginError"></div>
        
        <form onsubmit="handleAdminLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@apexhub.in" required>
            </div>
            <div class="form-group password-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i class="fas fa-eye" id="toggleIcon"></i>
                </button>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login to Dashboard
            </button>
        </form>
        
        <div class="login-footer">
            <p><a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a></p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const p = document.getElementById('password');
            const i = document.getElementById('toggleIcon');
            if (p.type === 'password') { p.type = 'text'; i.className = 'fas fa-eye-slash'; }
            else { p.type = 'password'; i.className = 'fas fa-eye'; }
        }

        function handleAdminLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            errorDiv.style.display = 'none';
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: email, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success && data.user && data.user.role === 'admin') {
                    localStorage.setItem('apexAdminLoggedIn', 'true');
                    localStorage.setItem('apexAdminUser', data.user.email);
                    localStorage.setItem('apexAdminToken', data.token);
                    window.location.href = 'dashboard.html';
                } else if (data.success) {
                    showError('Access denied. Admin only.');
                } else {
                    showError(data.message || 'Invalid credentials. Please try again.');
                }
            })
            .catch(err => {
                showError('Cannot connect to server. Please try again.');
            });
            
            function showError(msg) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + msg;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
            }
        }

        // Create default admin on first load
        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                fullName: 'Admin User',
                mobile: '9999999999',
                email: 'admin@apexhub.in',
                password: 'admin123',
                role: 'admin'
            })
        }).catch(() => {});
    </script>
</body>
</html>
