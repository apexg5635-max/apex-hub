<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Apex Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    
    <style>
        /* Additional login-specific styles */
        .login-page {
            position: relative;
            overflow: hidden;
        }
        
        .login-page::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245,166,35,0.15), transparent);
            top: -200px;
            right: -200px;
            border-radius: 50%;
        }
        
        .login-page::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.05), transparent);
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
        }
        
        .login-card {
            position: relative;
            z-index: 1;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 42px;
            cursor: pointer;
            color: #999;
        }
        
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .remember-row a {
            color: var(--primary);
            font-weight: 500;
        }
        
        .login-error {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <h2>APEX<span>HUB</span></h2>
                <small style="color:#888;font-size:0.8rem;">ADMIN PANEL</small>
            </div>
            
            <h3><i class="fas fa-lock"></i> Admin Login</h3>
            <p>Enter your credentials to access the dashboard</p>
            
            <!-- Error Message -->
            <div class="login-error" id="loginError">
                <i class="fas fa-exclamation-circle"></i> Invalid email or password. Please try again.
            </div>
            
            <form class="login-form" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="admin@apexhub.in" required>
                </div>
                
                <div class="form-group" style="position:relative;">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </span>
                </div>
                
                <div class="remember-row">
                    <label class="form-checkbox">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>
            
            <div class="login-footer">
                <p>© 2025 Apex Hub. All rights reserved.</p>
                <p><a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a></p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'fas fa-eye';
            }
        }
        
        function handleAdminLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            // Demo credentials check
            if (email === 'admin@apexhub.in' && password === 'admin123') {
                // Successful login
                errorDiv.style.display = 'none';
                
                // Store login state
                localStorage.setItem('apexAdminLoggedIn', 'true');
                localStorage.setItem('apexAdminUser', email);
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Show error
                errorDiv.style.display = 'block';
                
                // Shake animation
                const loginCard = document.querySelector('.login-card');
                loginCard.style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => {
                    loginCard.style.animation = '';
                }, 500);
            }
        }
        
        // Check if already logged in
        if (localStorage.getItem('apexAdminLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
    
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
    </style>
</body>
</html>
