<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Apex Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#1a237e;--gold:#f5a623;--bg:#f4f6f9;--card:#fff;--text:#1e293b;--light:#64748b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh}
        
        .top{background:var(--primary);color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
        .top h2{font-size:1.3rem;letter-spacing:2px}
        .top h2 span{color:var(--gold)}
        .top button{background:#ef4444;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.85rem}
        
        .container{max-width:800px;margin:0 auto;padding:20px}
        
        .welcome{background:linear-gradient(135deg,var(--primary),#283593);color:#fff;padding:30px;border-radius:16px;margin-bottom:20px}
        .welcome h1{font-size:1.5rem;margin-bottom:5px}
        .welcome p{opacity:.9;font-size:.9rem}
        
        .cards{display:grid;grid-template-columns:1fr;gap:12px}
        .card{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;align-items:center;gap:18px;cursor:pointer;transition:.3s;text-decoration:none;color:var(--text)}
        .card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.1)}
        .card-icon{width:55px;height:55px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;flex-shrink:0}
        .card-icon.courses{background:linear-gradient(135deg,#667eea,#764ba2)}
        .card-icon.videos{background:linear-gradient(135deg,#ef4444,#dc2626)}
        .card-icon.live{background:linear-gradient(135deg,#10b981,#059669)}
        .card-info h3{font-size:1rem;margin-bottom:3px}
        .card-info p{font-size:.8rem;color:var(--light)}
        .card-arrow{color:var(--primary);font-size:1.2rem;margin-left:auto}
        
        @media(max-width:480px){.container{padding:15px}.welcome{padding:20px}}
    </style>
</head>
<body>
    
    <!-- Top Bar -->
    <div class="top">
        <h2>APEX<span>HUB</span></h2>
        <div>
            <span id="topName" style="margin-right:15px;font-size:.9rem"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="container">
        
        <!-- Welcome -->
        <div class="welcome">
            <h1 id="welcomeMsg">Welcome back! 👋</h1>
            <p>Continue your preparation journey</p>
        </div>
        
        <!-- Quick Links -->
        <div class="cards">
            <a href="../student/course-content.html" class="card">
                <div class="card-icon courses">📚</div>
                <div class="card-info">
                    <h3>My Courses</h3>
                    <p>View course content & curriculum</p>
                </div>
                <span class="card-arrow">▶</span>
            </a>
            
            <a href="../student/watch-youtube.html" class="card">
                <div class="card-icon videos">▶</div>
                <div class="card-info">
                    <h3>Watch Videos</h3>
                    <p>Recorded lectures & tutorials</p>
                </div>
                <span class="card-arrow">▶</span>
            </a>
            
            <a href="../student/youtube-live.html" class="card">
                <div class="card-icon live">🔴</div>
                <div class="card-info">
                    <h3>Live Classes</h3>
                    <p>Join live sessions with faculty</p>
                </div>
                <span class="card-arrow">▶</span>
            </a>
        </div>
        
    </div>

    <script src="../js/auth.js"></script>
    <script>
        // Check auth
        const user=JSON.parse(localStorage.getItem('apexHubCurrentUser')||'{}');
        if(!user.id&&localStorage.getItem('apexHubCurrentUser')){
            // Fallback
        }
        
        // Display user name
        const name=user.fullName||localStorage.getItem('apexStudentName')||'Student';
        document.getElementById('welcomeMsg').textContent='Welcome, '+name.split(' ')[0]+'! 👋';
        document.getElementById('topName').textContent=name.split(' ')[0];
        
        function logout(){
            localStorage.removeItem('apexHubCurrentUser');
            localStorage.removeItem('apexStudentName');
            window.location.href='login.html';
        }
    </script>
</body>
</html>
