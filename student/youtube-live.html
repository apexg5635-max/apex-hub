<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Lecture - Apex Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:#0a0e27}
        .nav{background:#1a1a2e;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;color:#fff}
        .nav a{color:#fff;text-decoration:none}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        .player{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:15px}
        .player iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
        .info{background:#fff;border-radius:15px;padding:25px;margin-top:20px}
        .info h2{font-size:1.3rem;margin-bottom:10px;color:#1a237e}
        .info p{color:#888;font-size:.9rem}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin-top:20px}
        .vid-card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;transition:.3s}
        .vid-card:hover{transform:translateY(-4px)}
        .vid-card img{width:100%;height:150px;object-fit:cover}
        .vid-info{padding:12px}
        .vid-info h4{font-size:.85rem;margin-bottom:4px}
        .vid-info p{font-size:.75rem;color:#888}
    </style>
</head>
<body>
    <nav class="nav">
        <a href="../index.html"><strong>APEX<span style="color:#f5a623">HUB</span></strong></a>
        <a href="dashboard.html">← Dashboard</a>
    </nav>
    
    <div class="container">
        <div class="player"><iframe id="mainPlayer" src="" allow="autoplay; fullscreen"></iframe></div>
        <div class="info"><h2 id="videoTitle">Select a video</h2><p id="videoDesc">Click any video below to watch</p></div>
        <h3 style="color:#fff;margin-top:25px">📚 Course Videos</h3>
        <div class="grid" id="videoList"></div>
    </div>

    <script>
        let allVideos=[];
        
        function loadVideos(){
            fetch('/api/youtube-videos')
            .then(r=>r.json())
            .then(d=>{
                allVideos=d.videos||[];
                let list=document.getElementById('videoList');
                if(allVideos.length===0){list.innerHTML='<p style="color:#fff">No videos</p>';return;}
                list.innerHTML=allVideos.map(v=>`
                    <div class="vid-card" onclick="play('${v.youtubeId}','${v.title.replace(/'/g,"\\'")}','${(v.description||'').replace(/'/g,"\\'")}')">
                        <img src="${v.thumbnailUrl}" alt="${v.title}">
                        <div class="vid-info"><h4>${v.title}</h4><p>📁 ${v.courseId} | #${v.lectureNumber||'N/A'}</p></div>
                    </div>
                `).join('');
                if(allVideos.length>0)play(allVideos[0].youtubeId,allVideos[0].title,allVideos[0].description||'');
            });
        }
        
        function play(id,title,desc){
            document.getElementById('mainPlayer').src='https://www.youtube.com/embed/'+id+'?autoplay=1';
            document.getElementById('videoTitle').textContent=title;
            document.getElementById('videoDesc').textContent=desc||'';
        }
        
        loadVideos();
    </script>
</body>
</html>
