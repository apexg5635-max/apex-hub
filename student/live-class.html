<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Class - Apex Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="../js/auth.js"></script>
    <script>if(!requireAuth()){}</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:#0a0e27;color:white;height:100vh;display:flex;flex-direction:column;}
        .live-header{background:#1a1a2e;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;}
        .live-dot{width:12px;height:12px;background:#ef4444;border-radius:50%;animation:pulse 2s infinite;display:inline-block;margin-right:8px;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .live-main{flex:1;display:flex;}
        .stream-area{flex:1;display:flex;align-items:center;justify-content:center;background:#000;}
        .chat-sidebar{width:350px;background:#1a1a2e;display:flex;flex-direction:column;border-left:1px solid #333;}
        .chat-messages{flex:1;overflow-y:auto;padding:15px;}
        .chat-input-area{padding:15px;border-top:1px solid #333;display:flex;gap:10px;}
        .chat-input-area input{flex:1;padding:10px;border-radius:20px;border:none;background:#2a2a3e;color:white;font-family:'Poppins',sans-serif;}
        .chat-input-area button{padding:10px 20px;border-radius:20px;border:none;background:#f5a623;color:#1a1a2e;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;}
        @media(max-width:768px){.chat-sidebar{width:100%;max-height:40vh;}.live-main{flex-direction:column;}}
    </style>
</head>
<body>
    <div class="live-header">
        <div><span class="live-dot"></span><strong>LIVE</strong> • Fundamental Rights Doubt Session</div>
        <div><span>👥 245 watching</span> • Dr. Rajesh Sharma</div>
    </div>
    <div class="live-main">
        <div class="stream-area">
            <div style="text-align:center;">
                <i class="fas fa-broadcast-tower" style="font-size:4rem;color:#ef4444;"></i>
                <h2 style="margin-top:15px;">Live Stream</h2>
                <p style="color:#888;">Class is in progress...</p>
            </div>
        </div>
        <div class="chat-sidebar">
            <div class="chat-messages" id="chatMessages">
                <div style="margin-bottom:12px;"><strong style="color:#f5a623;">Dr. Rajesh:</strong> Welcome! Today we'll discuss FRs.</div>
                <div style="margin-bottom:12px;"><strong>Rahul:</strong> Sir, ready!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" placeholder="Type message..." id="chatInput" onkeypress="if(event.key==='Enter')sendMsg()">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>
    <script>
        function sendMsg(){
            const input=document.getElementById('chatInput');
            const msg=input.value.trim();
            if(msg){
                const div=document.createElement('div');
                div.style.marginBottom='12px';
                div.innerHTML='<strong>You:</strong> '+msg;
                document.getElementById('chatMessages').appendChild(div);
                input.value='';
                document.getElementById('chatMessages').scrollTop=document.getElementById('chatMessages').scrollHeight;
            }
        }
    </script>
</body>
</html>
